<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تجهيز المحافظ</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;background:#0d1b18;color:#eaf3f0;
       padding:24px 16px;max-width:560px;margin:0 auto;line-height:1.7}
  h1{font-size:1.3rem;margin-bottom:6px}
  p{color:#8fa9a1;font-size:.85rem;margin-bottom:16px}
  input,button{width:100%;font-family:inherit;font-size:1rem;border-radius:12px;padding:13px;margin-bottom:10px}
  input{background:#142b26;border:1px solid #22463f;color:#eaf3f0}
  button{background:#2fa98a;color:#04140f;border:none;font-weight:600;cursor:pointer}
  button.warn{background:transparent;border:1px solid #d9645a;color:#d9645a}
  pre{background:#142b26;border:1px solid #22463f;border-radius:12px;padding:12px;
      font-size:.75rem;white-space:pre-wrap;color:#8fa9a1;max-height:300px;overflow:auto}
  .ok{color:#2fa98a} .err{color:#d9645a}
</style>
</head>
<body>
<h1>تجهيز المحافظ</h1>
<p>شغّل هذي الصفحة <strong>مرة وحدة</strong> عشان تنشئ المحافظ وذاكرة المتاجر. بعدها احذف الملف أو تجاهله.</p>

<input id="pw" type="password" placeholder="كلمة المرور">
<button id="go">أنشئ المحافظ + ذاكرة المتاجر</button>
<button id="merchOnly" class="warn">ذاكرة المتاجر فقط (بدون لمس الأرصدة)</button>
<pre id="log">جاهز…</pre>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, AUTH_EMAIL } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const log = m => { const l = document.getElementById("log"); l.textContent += "\n" + m; l.scrollTop = l.scrollHeight; };

// ── المحافظ (من خطتنا) ──
const WALLETS = [
  { id:"housing",   name:"السكن",          emoji:"🏠", budget:5416, order:1 },
  { id:"groceries", name:"مقاضي البيت",    emoji:"🛒", budget:1800, order:2 },
  { id:"dining",    name:"مطاعم وتوصيل",   emoji:"🍔", budget:2000, order:3 },
  { id:"personal",  name:"شخصي",           emoji:"👤", budget:2000, order:4 },
  { id:"wife",      name:"الزوجة",         emoji:"👩", budget:1200, order:5 },
  { id:"mother",    name:"الوالدة",        emoji:"👵", budget:600,  order:6 },
  { id:"gym",       name:"النادي",         emoji:"🏋️", budget:438,  order:7 },
  { id:"fuel",      name:"بنزين",          emoji:"⛽", budget:270,  order:8 },
  { id:"furniture", name:"أثاث كبير",      emoji:"🛋️", budget:1000, order:9 },
  { id:"jeddah",    name:"جدة",            emoji:"✈️", budget:700,  order:10 },
  { id:"emergency", name:"طوارئ",          emoji:"⚠️", budget:1500, order:11 },
  { id:"father",    name:"قسط الوالد",     emoji:"👨", budget:4000, order:12 },
  { id:"mastercard",name:"ماستركارد",      emoji:"💳", budget:1520, order:13 },
  { id:"sabic",     name:"سابك (تجميع)",   emoji:"🏭", budget:0,    order:14 },
];

// ── ذاكرة المتاجر (كل اللي صنّفناه سوا) ──
const MERCHANTS = {
  dining: ["bufiat nafar kabida","dunkin","dunkin donuts","mcdonalds","mcdonalds-cordoba cent",
           "mcdonalds-khalid bin w","aziz tea","hemi cafe","kibdat al muallimi","habibah sweets",
           "express food company","alhatabt co","mathaq al jawhara cafe","jadt alghethaa co",
           "abdulmajeed est","ninja","half million","barns"],
  groceries:["tamimi markets","s175 tamimi markets","panda","abdullah salem alnuman","ninja retail",
             "montjat alhaywan compa","munirah est","loop","atilalat qartabih","rwafd co",
             "ala kaifak trading","qwen altjaryah set","kanz alalmiah company","khotwat jamal trading"],
  personal: ["apple.com/bill","jarir bookstore","mwssh hlaq syt alwsamh","new you5ed barbr shop",
             "saco","ebdae keef najd","abda jnain co","playstation","amazon sa"],
  housing:  ["shahad al otaibi laund","saudi laundries","stc","الاتصالات السعودية"],
  fuel:     ["aldrees petrolum co","naft services company"],
  jeddah:   ["saudi airlines","riyadh air","uber","pending.uber.com"],
  emergency:["alnahdi pharmacy","alnahdi pharmacy7660","alnahdi pharmacy8306"],
};

const norm = s => s.trim().toLowerCase().replace(/[^\p{L}\p{N}]+/gu,"-").slice(0,90);

async function login(){
  const pw = document.getElementById("pw").value.trim();
  if(!pw) throw new Error("اكتب كلمة المرور");
  await signInWithEmailAndPassword(auth, AUTH_EMAIL, pw);
  log("✓ دخول ناجح");
}

async function seedMerchants(){
  let n=0;
  for(const [wallet, list] of Object.entries(MERCHANTS)){
    for(const m of list){
      await setDoc(doc(db,"merchants",norm(m)),{ wallet, merchant:m, updatedAt:serverTimestamp() });
      n++;
    }
  }
  log(`✓ ${n} متجر في الذاكرة`);
}

document.getElementById("go").onclick = async () => {
  try{
    await login();
    for(const w of WALLETS){
      await setDoc(doc(db,"wallets",w.id),{ ...w, balance:w.budget, spent:0 });
      log(`✓ محفظة: ${w.emoji} ${w.name}`);
    }
    await seedMerchants();
    log("\n🎉 خلصنا — افتح index.html");
  }catch(e){ log("✗ " + e.message); }
};

document.getElementById("merchOnly").onclick = async () => {
  try{ await login(); await seedMerchants(); log("\n✓ الذاكرة تحدّثت"); }
  catch(e){ log("✗ " + e.message); }
};
</script>
</body>
</html>
